<!DOCTYPE html>
<html>
<head>
  <title>Robot Dance</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🤖 Dancing Robot</h1>
</header>

<main>
  <div class="robot" id="robot">
    <div class="head"></div>
    <div class="body"></div>
    <div class="arm left"></div>
    <div class="arm right"></div>
    <div class="leg left"></div>
    <div class="leg right"></div>
  </div>

  <button onclick="toggleDance()">Start / Stop Dance</button>
</main>

<footer>
  <p>© 2026 Robot Animation Project</p>
</footer>

<script src="script.js"></script>
</body>
</html>
